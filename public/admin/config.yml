backend:
  name: github
  repo: Regihub/fara
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "weeks"
    label: "Aktuálne farské oznamy"
    files:
      - file: "src/content/weeks/current.json"
        label: "Aktuálny týždeň"
        name: "current"
        fields:
          - label: "Názov"
            name: "title"
            widget: "string"
            default: "Farské oznamy"

          - label: "Platné od"
            name: "weekStart"
            widget: "date"
            format: "YYYY-MM-DD"

          - label: "Platné do"
            name: "weekEnd"
            widget: "date"
            format: "YYYY-MM-DD"

          - label: "Všeobecné oznamy"
            name: "general"
            widget: "markdown"

          - label: "Sväté omše"
            name: "masses"
            widget: "list"
            summary: "{{fields.day}} {{fields.date}} {{fields.time}}"
            fields:
              - { label: "Deň", name: "day", widget: "string" }
              - { label: "Dátum", name: "date", widget: "date", format: "YYYY-MM-DD" }
              - { label: "Čas", name: "time", widget: "string" }
              - { label: "Úmysel", name: "intention", widget: "string", required: false }
              - { label: "Miesto", name: "place", widget: "string", required: false, default: "Farský kostol" }
              - { label: "Poznámka", name: "note", widget: "string", required: false }