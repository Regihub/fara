<!doctype html>
<html lang="sk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Správa obsahu</title>
  </head>
  <body>
    <script>
      // Zabránime automatickej inicializácii CMS,
      // aby sme mali istotu, že sa načíta aktuálny config.yml.
      window.CMS_MANUAL_INIT = true;

      async function createWeekEntry() {
        try {
          const res = await fetch('/api/week-template');
          const data = await res.json();

          // Dočasne uložíme slug pre ďalšie použitie.
          sessionStorage.setItem('cms-week-slug', data.slug);

          // Otvoríme formulár pre nový záznam.
          window.location.hash = '#/collections/weeks/new';
        } catch (e) {
          console.error('Failed to create week:', e);
        }
      }

      function bindButton() {
        const btn = document.querySelector(
          'a[href="#/collections/weeks/new"]'
        );

        // Listener pridáme len raz.
        if (btn && !btn.dataset.bound) {
          btn.dataset.bound = 'true';

          btn.addEventListener('click', (e) => {
            e.preventDefault();
            createWeekEntry();
          });
        }
      }
    </script>

    <!-- DÔLEŽITÉ: načítanie kompletného CMS bundle -->
    <script src="https://unpkg.com/decap-cms@3/dist/decap-cms.js"></script>

    <script>
      // Manuálna inicializácia CMS.
      CMS.init();

      // CMS renderuje rozhranie dynamicky, preto sledujeme zmeny DOM.
      const observer = new MutationObserver(() => {
        bindButton();
      });

      observer.observe(document.body, {
        childList: true,
        subtree: true
      });

      // Pokus o naviazanie tlačidla po načítaní stránky.
      window.addEventListener('load', bindButton);
    </script>
  </body>
</html>
