<!doctype html>
<html lang="sk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Správa obsahu</title>
  </head>
  <body>
    <script>
      // Odstráni problematickú lokálnu preferenciu.
      localStorage.removeItem('decap-cms.entries.viewStyle');

      // Spracovanie OAuth odpovede z popup okna.
      window.addEventListener('message', function (event) {
        if (event.origin !== window.location.origin) {
          return;
        }

        const msg = event.data;

        if (
          typeof msg === 'string' &&
          msg.startsWith('authorization:github:success:')
        ) {
          const json = msg.replace(
            'authorization:github:success:',
            ''
          );

          const data = JSON.parse(json);

          localStorage.setItem(
            'decap-cms-user',
            JSON.stringify({
              backendName: 'github',
              token: data.token,
            })
          );

          window.location.href = '/admin/';
        }
      });

      async function createWeekEntry() {
        try {
          const stored = localStorage.getItem(
            'decap-cms-user'
          );

          if (!stored) {
            alert('Nie ste prihlásený.');
            return;
          }

          const user = JSON.parse(stored);

          const response = await fetch('/api/create-week', {
            method: 'GET',
            headers: {
              Authorization: `Bearer ${user.token}`,
            },
          });

          const data = await response.json();

          if (!response.ok) {
            console.error(data);
            alert(
  'Nepodarilo sa vytvoriť nový týždeň:\n\n' +
  JSON.stringify(data, null, 2)
);
            return;
          }

          // Otvorí už existujúci alebo práve vytvorený súbor.
          window.location.hash =
            '#/collections/weeks/entries/' +
            data.slug;
        } catch (error) {
          console.error(error);
          alert(
  'Chyba pri vytváraní týždňa:\n\n' +
  error
);
        }
      }
    </script>

    <script src="https://unpkg.com/decap-cms@3/dist/decap-cms.js"></script>

    <script>
      function bindNewButton() {
        const button = document.querySelector(
          'a[href="#/collections/weeks/new"]'
        );

        if (button && !button.dataset.bound) {
          button.dataset.bound = 'true';

          button.addEventListener('click', function (event) {
            event.preventDefault();
            createWeekEntry();
          });
        }
      }

      const observer = new MutationObserver(
        bindNewButton
      );

      observer.observe(document.body, {
        childList: true,
        subtree: true,
      });

      window.addEventListener('load', bindNewButton);
    </script>
  </body>
</html>
