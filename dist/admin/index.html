<!doctype html>
<html lang="sk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Správa obsahu</title>
  </head>
  <body>
    <script>
      // Odstráni lokálnu preferenciu, ktorá môže spôsobiť problémy v CMS
      localStorage.removeItem('decap-cms.entries.viewStyle');

      // Spracovanie OAuth odpovede z popup okna
      window.addEventListener('message', function (event) {
        if (event.origin !== window.location.origin) {
          return;
        }

        const msg = event.data;

        if (
          typeof msg === 'string' &&
          msg.startsWith('authorization:github:success:')
        ) {
          const json = msg.replace(
            'authorization:github:success:',
            ''
          );

          const data = JSON.parse(json);

          localStorage.setItem(
            'decap-cms-user',
            JSON.stringify({
              backendName: 'github',
              token: data.token,
            })
          );

          // Po úspešnom prihlásení načítaj CMS znova
          window.location.href = '/admin/';
        }
      });
    </script>

    <script src="https://unpkg.com/decap-cms@3/dist/decap-cms.js"></script>
  </body>
</html>
