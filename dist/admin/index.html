<!doctype html>
<html lang="sk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Správa obsahu</title>
  </head>

  <body>
    <!-- =========================
         AUTH HANDLER (GITHUB)
    ========================== -->
    <script>
      window.addEventListener('message', function (event) {
        const msg = event.data;

        if (
          typeof msg === 'string' &&
          msg.startsWith('authorization:github:success:')
        ) {
          const json = msg.replace(
            'authorization:github:success:',
            ''
          );

          const data = JSON.parse(json);

          localStorage.setItem(
            'decap-cms-user',
            JSON.stringify({
              backendName: 'github',
              token: data.token,
            })
          );

          // fix UI glitch
          localStorage.removeItem('decap-cms.entries.viewStyle');

          window.location.href = '/admin/#/';
        }
      });
    </script>

    <!-- =========================
         CMS LOAD
    ========================== -->
    <script src="https://unpkg.com/decap-cms@3/dist/decap-cms.js"></script>

    <!-- =========================
         TEMPLATE LOADER
    ========================== -->
    <script>
      let WEEK_TEMPLATE = null;

      async function loadTemplate() {
        try {
          const res = await fetch('/api/week-template');
          const data = await res.json();

          WEEK_TEMPLATE = data.template;

          // debug (môžeš vymazať)
          console.log('Week template loaded:', WEEK_TEMPLATE);
        } catch (e) {
          console.error('Failed to load week template', e);
        }
      }

      loadTemplate();
    </script>

    <!-- =========================
         CMS HOOK
    ========================== -->
    <script>
      CMS.registerEventListener({
        name: 'preSave',
        handler: function ({ entry }) {
          const data = entry.get('data');

          // nový záznam → predvyplniť template
          if (!data || data.size === 0) {
            if (WEEK_TEMPLATE) {
              return entry.set(
                'data',
                window.Immutable.fromJS(WEEK_TEMPLATE)
              );
            }
          }

          return entry;
        },
      });
    </script>
  </body>
</html>
