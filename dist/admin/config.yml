backend:
  name: github
  repo: Regihub/fara
  branch: main
  base_url: https://fara-beta-pink.vercel.app/api
  auth_endpoint: auth

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "weeks"
    label: "Farské oznamy"
    folder: "src/content/weeks"
    create: true
    extension: "json"
    format: "json"
    slug: "{{year}}-W{{weekNumber}}"
    identifier_field: "title"

    fields:
      - { label: "Názov", name: "title", widget: "string" }
      - { label: "Číslo týždňa", name: "weekNumber", widget: "number" }
      - { label: "Rok", name: "year", widget: "number" }

      - label: "Platné od"
        name: "weekStart"
        widget: "string"

      - label: "Platné do"
        name: "weekEnd"
        widget: "string"

      - { label: "Všeobecné oznamy", name: "general", widget: "markdown" }

      - label: "Sväté omše"
        name: "masses"
        widget: "list"
        fields:
          - { label: "Deň", name: "day", widget: "string" }
          - { label: "Dátum", name: "date", widget: "string" }
          - { label: "Čas", name: "time", widget: "string" }
          - { label: "Úmysel", name: "intention", widget: "string", required: false }
          - { label: "Miesto", name: "place", widget: "string", required: false }
          - { label: "Poznámka", name: "note", widget: "string", required: false }